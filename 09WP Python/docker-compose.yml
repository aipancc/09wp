version: "3.9"
services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@mysql:3306/09wp
      - REDIS_URL=redis://redis:6379/0
      - MEILI_URL=http://meilisearch:7700
      - MEILI_KEY=devkey
      - JWT_SECRET=supersecret
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
      - meilisearch

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: 09wp
    ports:
      - "3306:3306"

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeilisearch/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: devkey
    ports:
      - "7700:7700"
